- name: Install dependencies for Caddy
  ansible.builtin.apt:
    name:
    - debian-keyring
    - debian-archive-keyring
    - apt-transport-https
    - python3-debian
    - libnss3-tools
    state: present

- name: Add Caddy GPG key
  ansible.builtin.get_url:
    url: https://dl.cloudsmith.io/public/caddy/stable/gpg.key
    dest: /usr/share/keyrings/caddy-stable-archive-keyring.gpg
    mode: '0644'

- name: Add Caddy DEB822 repository
  ansible.builtin.deb822_repository:
    name: caddy-stable
    uris: "https://dl.cloudsmith.io/public/caddy/stable/deb/debian"
    suites: any-version
    components: [main]
    signed_by: /usr/share/keyrings/caddy-stable-archive-keyring.gpg
    state: present
  ignore_errors: "{{ ansible_check_mode }}"

- name: Install Caddy package
  ansible.builtin.apt:
    name: caddy
    state: present
    update_cache: yes

- name: Hold Caddy at current version to prevent auto-upgrades
  ansible.builtin.dpkg_selections:
    name: caddy
    selection: hold
  ignore_errors: "{{ ansible_check_mode }}"
