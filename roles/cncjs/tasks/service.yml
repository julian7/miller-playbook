- name: cncjs.service file
  ansible.builtin.template:
    src: templates/systemd-cncjs.service.j2
    dest: /etc/systemd/system/cncjs.service
    owner: root
    group: root
    mode: "0644"
  notify:
  - daemon-reload
  - restart-cncjs
- name: cncjs service
  ansible.builtin.service:
    name: cncjs
    enabled: yes
    state: started
